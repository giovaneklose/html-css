<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos</title>
    <link rel="shortcut icon" href="favinco/favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>Anexando video</h1>
    <h2>Video baixado</h2>
    <video controls width="500" preload="metadata">
        <source src="video/meu-video.mp4" type="video/mp4">
    
        <p>Seu navegador nao e compativel, <a href="video/meu-video.mp4">assista aqui</a></p>
    </video>
    <h2>Video externo</h2>
    <iframe width="500" height="300" src="https://www.youtube.com/embed/CVFFcgvdLts?si=JyVCOI5oMskM7_tm" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
