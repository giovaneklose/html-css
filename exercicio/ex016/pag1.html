<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1em;
            background-image: linear-gradient(to right, #00ffff, #0000007e);
            color: white;

        }

        div.interações { 
            background-color: #0c71c9;
            display: inline-block;
            border: 1px solid #5c5c5c;
            width: 200px;
            height: 200px;
            text-align: center;
            color: #860a1b;
            border-radius: 10px;
        }

        div.interações:hover {
            background-color: #12c5477e;
        }

        h1 {
            text-align: center;
            font-weight: bold;
            background-color: #860a1b;
            border-radius: 20px;
            box-shadow: 5px 5px 5px #860a1b5e;
        }

        div {
            text-align: center;
        }

        div:hover {
            color: white;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: white;
            background-color: #860a1b;
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <h1>Interações</h1>

    <div class="interações">01</div>
    <div class="interações">02</div>
    <div class="interações">03</div>

    <h1>Texto Escondido</h1>
    
    <div>
        Passe o ponteiro aqui para ver o texto escondido
        <p>Aqui está o testo escondido</p>
    </div>
</body>
</html>
